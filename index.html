<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>金额大小写转换工具</title>
  <meta name="description" content="在线把数字金额转换为人民币大写、英文金额表达和英文支票写法，支持小数、角分和 cents。">
  <meta name="keywords" content="人民币大写,金额大写转换,英文支票写法,数字金额转英文,US Dollar check writing">
  <meta name="robots" content="index,follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="金额大小写转换工具">
  <meta property="og:description" content="输入数字金额，自动生成人民币大写、英文金额表达和英文支票写法。">
  <meta name="twitter:card" content="summary">
  <meta name="theme-color" content="#0f766e">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d8dee8;
      --accent: #0f766e;
      --accent-2: #b45309;
      --soft: #edf7f5;
      --soft-2: #fff7ed;
      --danger: #b91c1c;
      --shadow: 0 18px 48px rgba(31, 41, 55, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      background:
        linear-gradient(180deg, rgba(15, 118, 110, 0.08), rgba(180, 83, 9, 0.05) 48%, transparent),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(26px, 4vw, 40px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .badge {
      flex: 0 0 auto;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-size: 13px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(300px, 0.9fr) minmax(0, 1.1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(216, 222, 232, 0.9);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .input-panel {
      padding: 20px;
      position: sticky;
      top: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .amount-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    input,
    select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 16px;
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    input {
      padding: 0 13px;
      font-size: 22px;
      font-variant-numeric: tabular-nums;
    }

    select {
      padding: 0 36px 0 12px;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.14);
    }

    .currency-select {
      min-width: 150px;
    }

    .field {
      margin-top: 18px;
    }

    .settings {
      display: grid;
      gap: 12px;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .switch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .switch-text strong {
      display: block;
      font-size: 14px;
    }

    .switch-text span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .toggle {
      position: relative;
      width: 48px;
      height: 28px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: #cbd5e1;
      transition: background 150ms ease;
      cursor: pointer;
    }

    .toggle::after {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.22);
      transition: transform 150ms ease;
    }

    .switch input:checked + .toggle {
      background: var(--accent);
    }

    .switch input:checked + .toggle::after {
      transform: translateX(20px);
    }

    .quick-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
      cursor: pointer;
      transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
    }

    button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--soft);
    }

    .results {
      display: grid;
      gap: 14px;
    }

    .result-card {
      padding: 18px;
      overflow: hidden;
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .result-title {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .copy-btn {
      min-height: 34px;
      padding: 0 12px;
      color: var(--accent);
      border-color: rgba(15, 118, 110, 0.28);
      background: var(--soft);
      white-space: nowrap;
    }

    .copy-btn.copied {
      color: var(--accent-2);
      border-color: rgba(180, 83, 9, 0.35);
      background: var(--soft-2);
    }

    .output {
      min-height: 62px;
      display: flex;
      align-items: center;
      padding: 14px;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid #e8edf4;
      font-size: clamp(18px, 2.2vw, 26px);
      line-height: 1.35;
      word-break: break-word;
    }

    .output.en {
      font-family: "Segoe UI", Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .error {
      display: none;
      margin-top: 12px;
      color: var(--danger);
      font-size: 14px;
      line-height: 1.45;
    }

    .error.show {
      display: block;
    }

    .notes {
      margin-top: 16px;
      padding: 14px;
      border-radius: 8px;
      background: #fbfcfe;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .notes p {
      margin: 0;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 22px, 720px);
        padding-top: 18px;
      }

      .topbar {
        display: block;
      }

      .badge {
        display: inline-block;
        margin-top: 12px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .input-panel {
        position: static;
      }

      .amount-row {
        grid-template-columns: 1fr;
      }

      .quick-list {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div>
        <h1>金额大小写转换</h1>
        <p class="subtitle">人民币大写、英文金额表达、英文支票写法一次生成。</p>
      </div>
      <span class="badge">支持到万亿级 · 自动处理角分与 cents</span>
    </div>

    <div class="workspace">
      <section class="panel input-panel" aria-label="输入金额">
        <label for="amount">数字金额</label>
        <div class="amount-row">
          <input id="amount" inputmode="decimal" autocomplete="off" value="1200" aria-describedby="error">
          <select id="currency" class="currency-select" aria-label="英文币种">
            <option value="US DOLLAR" selected>US DOLLAR</option>
            <option value="US DOLLARS">US DOLLARS</option>
            <option value="RMB YUAN">RMB YUAN</option>
            <option value="HONG KONG DOLLAR">HK DOLLAR</option>
            <option value="EURO">EURO</option>
          </select>
        </div>
        <div id="error" class="error"></div>

        <div class="field">
          <label>常用示例</label>
          <div class="quick-list">
            <button type="button" data-example="1200">1200</button>
            <button type="button" data-example="1001">1001</button>
            <button type="button" data-example="1200.50">1200.50</button>
            <button type="button" data-example="1000000">1000000</button>
            <button type="button" data-example="1234567.89">1234567.89</button>
            <button type="button" data-example="0.06">0.06</button>
          </div>
        </div>

        <div class="settings">
          <label class="switch">
            <span class="switch-text">
              <strong>英文支票加 AND</strong>
              <span>开启后输出类似 “ONE THOUSAND AND TWO HUNDRED AND 00/100”。</span>
            </span>
            <input id="checkAnd" type="checkbox" checked>
            <span class="toggle" aria-hidden="true"></span>
          </label>

          <label class="switch">
            <span class="switch-text">
              <strong>英文金额显示 cents</strong>
              <span>有小数时显示 “AND FIFTY CENTS ONLY”。</span>
            </span>
            <input id="sayCents" type="checkbox" checked>
            <span class="toggle" aria-hidden="true"></span>
          </label>
        </div>

        <div class="notes">
          <p>提示：英文支票通常用 “整数 AND xx/100”，不同银行或公司模板对 AND 的位置可能略有差异，可用开关匹配你的格式。</p>
        </div>
      </section>

      <section class="results" aria-live="polite">
        <article class="panel result-card">
          <div class="result-head">
            <h2 class="result-title">人民币大写</h2>
            <button class="copy-btn" type="button" data-copy="rmbOutput">复制</button>
          </div>
          <div id="rmbOutput" class="output">人民币壹仟贰佰元整</div>
        </article>

        <article class="panel result-card">
          <div class="result-head">
            <h2 class="result-title">英文金额表达</h2>
            <button class="copy-btn" type="button" data-copy="sayOutput">复制</button>
          </div>
          <div id="sayOutput" class="output en">SAY US DOLLAR ONE THOUSAND TWO HUNDRED ONLY</div>
        </article>

        <article class="panel result-card">
          <div class="result-head">
            <h2 class="result-title">英文支票写法</h2>
            <button class="copy-btn" type="button" data-copy="checkOutput">复制</button>
          </div>
          <div id="checkOutput" class="output en">ONE THOUSAND AND TWO HUNDRED AND 00/100</div>
        </article>
      </section>
    </div>
  </main>

  <script>
    const amountInput = document.querySelector("#amount");
    const currencySelect = document.querySelector("#currency");
    const checkAndInput = document.querySelector("#checkAnd");
    const sayCentsInput = document.querySelector("#sayCents");
    const errorBox = document.querySelector("#error");
    const outputs = {
      rmb: document.querySelector("#rmbOutput"),
      say: document.querySelector("#sayOutput"),
      check: document.querySelector("#checkOutput")
    };

    const cnDigits = ["零", "壹", "贰", "叁", "肆", "伍", "陆", "柒", "捌", "玖"];
    const cnSmallUnits = ["", "拾", "佰", "仟"];
    const cnBigUnits = ["", "万", "亿", "兆"];
    const smallNumbers = [
      "ZERO", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE",
      "TEN", "ELEVEN", "TWELVE", "THIRTEEN", "FOURTEEN", "FIFTEEN", "SIXTEEN",
      "SEVENTEEN", "EIGHTEEN", "NINETEEN"
    ];
    const tensNumbers = ["", "", "TWENTY", "THIRTY", "FORTY", "FIFTY", "SIXTY", "SEVENTY", "EIGHTY", "NINETY"];
    const scaleWords = ["", "THOUSAND", "MILLION", "BILLION", "TRILLION"];

    function sanitizeAmount(value) {
      return value.replace(/,/g, "").trim();
    }

    function parseAmount(value) {
      const cleaned = sanitizeAmount(value);
      if (!/^(?:\d+|\d*\.\d+)$/.test(cleaned)) {
        throw new Error("请输入有效数字，例如 1200、1200.50 或 0.06。");
      }

      const [integerRaw, decimalRaw = ""] = cleaned.split(".");
      const integerPart = (integerRaw || "0").replace(/^0+(?=\d)/, "");
      if (integerPart.length > 16) {
        throw new Error("金额太大了。这个工具当前建议处理 16 位以内整数。");
      }

      const cents = Math.round(Number(`0.${decimalRaw}`) * 100);
      let dollars = BigInt(integerPart || "0");
      let centValue = cents;
      if (centValue === 100) {
        dollars += 1n;
        centValue = 0;
      }

      return {
        integer: dollars.toString(),
        cents: centValue,
        hasDecimal: decimalRaw.length > 0
      };
    }

    function convertFourDigitsToChinese(group) {
      const padded = group.padStart(4, "0");
      let result = "";
      let pendingZero = false;

      for (let i = 0; i < padded.length; i += 1) {
        const digit = Number(padded[i]);
        const unitIndex = padded.length - 1 - i;
        if (digit === 0) {
          if (result) pendingZero = true;
          continue;
        }

        if (pendingZero) {
          result += "零";
          pendingZero = false;
        }
        result += cnDigits[digit] + cnSmallUnits[unitIndex];
      }

      return result;
    }

    function integerToChinese(integerText) {
      if (integerText === "0") return "零";

      const groups = [];
      for (let end = integerText.length; end > 0; end -= 4) {
        groups.unshift(integerText.slice(Math.max(0, end - 4), end));
      }

      let result = "";
      let needZero = false;
      groups.forEach((group, index) => {
        const groupNumber = Number(group);
        const bigUnit = cnBigUnits[groups.length - 1 - index] || "";

        if (groupNumber === 0) {
          if (result) needZero = true;
          return;
        }

        if (needZero || (result && groupNumber < 1000)) {
          if (!result.endsWith("零")) result += "零";
          needZero = false;
        }

        result += convertFourDigitsToChinese(group) + bigUnit;
      });

      return result.replace(/零+/g, "零").replace(/零$/g, "");
    }

    function toRmbUpper(integerText, cents) {
      const jiao = Math.floor(cents / 10);
      const fen = cents % 10;
      const yuan = integerToChinese(integerText);
      let result = `人民币${yuan}元`;

      if (jiao === 0 && fen === 0) return `${result}整`;
      if (jiao > 0) result += `${cnDigits[jiao]}角`;
      if (jiao === 0 && fen > 0) result += "零";
      if (fen > 0) result += `${cnDigits[fen]}分`;
      return result;
    }

    function underThousandToEnglish(num, includeAnd) {
      const words = [];
      const hundreds = Math.floor(num / 100);
      const rest = num % 100;

      if (hundreds > 0) {
        words.push(smallNumbers[hundreds], "HUNDRED");
        if (rest > 0 && includeAnd) words.push("AND");
      }

      if (rest >= 20) {
        words.push(tensNumbers[Math.floor(rest / 10)]);
        if (rest % 10 > 0) words.push(smallNumbers[rest % 10]);
      } else if (rest > 0) {
        words.push(smallNumbers[rest]);
      }

      return words.join(" ");
    }

    function integerToEnglish(integerText, options = {}) {
      const includeGroupAnd = Boolean(options.includeGroupAnd);
      const includeHundredAnd = Boolean(options.includeHundredAnd);
      if (integerText === "0") return "ZERO";

      const groups = [];
      for (let end = integerText.length; end > 0; end -= 3) {
        groups.unshift(Number(integerText.slice(Math.max(0, end - 3), end)));
      }

      const parts = [];
      groups.forEach((group, index) => {
        if (!group) return;
        const scale = scaleWords[groups.length - 1 - index];
        const groupWords = underThousandToEnglish(group, includeHundredAnd);
        parts.push(scale ? `${groupWords} ${scale}` : groupWords);
      });

      if (includeGroupAnd && parts.length > 1) {
        return `${parts.slice(0, -1).join(" ")} AND ${parts.at(-1)}`;
      }
      return parts.join(" ");
    }

    function centsToEnglish(cents) {
      return underThousandToEnglish(cents, false);
    }

    function makeSayOutput(integerText, cents, currency) {
      const integerWords = integerToEnglish(integerText, { includeHundredAnd: false });
      if (cents > 0 && sayCentsInput.checked) {
        const centWord = cents === 1 ? "CENT" : "CENTS";
        return `SAY ${currency} ${integerWords} AND ${centsToEnglish(cents)} ${centWord} ONLY`;
      }
      return `SAY ${currency} ${integerWords} ONLY`;
    }

    function makeCheckOutput(integerText, cents) {
      const integerWords = integerToEnglish(integerText, {
        includeGroupAnd: checkAndInput.checked,
        includeHundredAnd: false
      });
      return `${integerWords} AND ${String(cents).padStart(2, "0")}/100`;
    }

    function updateOutputs() {
      try {
        const amount = parseAmount(amountInput.value);
        outputs.rmb.textContent = toRmbUpper(amount.integer, amount.cents);
        outputs.say.textContent = makeSayOutput(amount.integer, amount.cents, currencySelect.value);
        outputs.check.textContent = makeCheckOutput(amount.integer, amount.cents);
        errorBox.classList.remove("show");
        errorBox.textContent = "";
      } catch (error) {
        errorBox.textContent = error.message;
        errorBox.classList.add("show");
      }
    }

    document.querySelectorAll("[data-example]").forEach((button) => {
      button.addEventListener("click", () => {
        amountInput.value = button.dataset.example;
        amountInput.focus();
        updateOutputs();
      });
    });

    document.querySelectorAll("[data-copy]").forEach((button) => {
      button.addEventListener("click", async () => {
        const target = document.querySelector(`#${button.dataset.copy}`);
        await navigator.clipboard.writeText(target.textContent);
        button.textContent = "已复制";
        button.classList.add("copied");
        setTimeout(() => {
          button.textContent = "复制";
          button.classList.remove("copied");
        }, 1200);
      });
    });

    [amountInput, currencySelect, checkAndInput, sayCentsInput].forEach((element) => {
      element.addEventListener("input", updateOutputs);
      element.addEventListener("change", updateOutputs);
    });

    updateOutputs();
  </script>
</body>
</html>
